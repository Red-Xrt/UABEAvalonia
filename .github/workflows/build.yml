name: Build UABEAvalonia

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Or the version matching UABEAvalonia

    - name: Restore dependencies
      run: dotnet restore UABEAvalonia.sln

    - name: Build
      run: dotnet build UABEAvalonia.sln --configuration Release --no-restore
