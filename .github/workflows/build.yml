name: Build UABEAvalonia

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild (Windows only)
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v2

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore UABEAvalonia.sln

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: msbuild UABEAvalonia.sln /p:Configuration=Release

    - name: Build (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: dotnet build UABEAvalonia.sln --configuration Release --no-restore
